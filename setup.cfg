[bdist_wheel]
universal = 1

[flake8]
max-line-length = 120
exclude =
    .git
    __pycache__
    */migrations/*
    env
    .tox

[isort]
profile = black
line_length = 90
skip_gitignore = true
atomic = true
honor_noqa = true
remove_redundant_aliases = true
known_first_party = gargoyle,testapp
known_third_party = django,nexus

[tool:pytest]
addopts = -p no:doctest
          --cov=gargoyle
          --cov-report term-missing
          --cov-fail-under 80
